name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # The repo's .cargo/config.toml pins x86_64-pc-windows-gnu for local Windows
  # dev. CI runs natively on Linux (the crate is platform-agnostic), so override
  # the build target here to the host triple.
  CARGO_BUILD_TARGET: x86_64-unknown-linux-gnu

jobs:
  test:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all-targets

  e2e-stdio:
    name: cross-process stdio e2e (self-contained)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      # Use this crate's own mock MCP server — no external project dependency.
      - name: Build mock MCP server
        run: cargo build --example mock_mcp_stdio

      - name: Run cross-process stdio e2e
        env:
          AIRP_MCP_BIN: ${{ github.workspace }}/target/x86_64-unknown-linux-gnu/debug/examples/mock_mcp_stdio
        run: cargo test --test e2e_stdio -- --nocapture
