name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # The repo's .cargo/config.toml pins x86_64-pc-windows-gnu for local Windows
  # dev. CI runs natively on Linux (the crate is platform-agnostic), so override
  # the build target here to the host triple.
  CARGO_BUILD_TARGET: x86_64-unknown-linux-gnu

jobs:
  test:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all-targets

  e2e-stdio:
    name: real cross-process stdio e2e
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gateway
        uses: actions/checkout@v4
        with:
          path: gateway

      - name: Checkout AIRP-MCP-Server
        uses: actions/checkout@v4
        with:
          repository: GhostXia/AIRP-MCP-Server
          path: mcp-server
          fetch-depth: 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            gateway
            mcp-server

      - name: Build real airp-mcp from source
        run: cargo build --release --manifest-path mcp-server/Cargo.toml

      - name: Run cross-process stdio e2e
        env:
          # Built with CARGO_BUILD_TARGET set, so output lives under the triple dir.
          AIRP_MCP_BIN: ${{ github.workspace }}/mcp-server/target/x86_64-unknown-linux-gnu/release/airp-mcp
        run: cargo test --manifest-path gateway/Cargo.toml --test e2e_stdio -- --nocapture
